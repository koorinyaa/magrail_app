name: iOS Sideload IPA

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Use Swift Package Manager for iOS plugins
        run: |
          rm -rf ios/Pods
          rm -f ios/Podfile.lock
          rm -f ios/Podfile

      - name: Build iOS app without codesign
        run: flutter build ios --release --no-codesign --no-pub

      - name: Package unsigned IPA
        run: |
          rm -rf Payload Magrail-sideload.ipa
          test -d build/ios/iphoneos/Runner.app
          mkdir Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          zip -qry Magrail-sideload.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: magrail-ios-sideload-ipa
          path: Magrail-sideload.ipa
